<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة تهنئة بالعيد</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0d6efd, #0a3d91);
      color: white;
      padding: 30px 15px;
      margin: 0;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    input[type="text"] {
      padding: 12px;
      width: 280px;
      max-width: 90%;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 14px;
      font-family: 'Cairo', sans-serif;
    }

    .designs {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .design-card {
      width: 180px;
      border: 3px solid transparent;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      transition: 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .design-card:hover {
      transform: translateY(-3px);
    }

    .design-card.selected {
      border-color: #ffc107;
      box-shadow: 0 0 0 4px rgba(255,193,7,0.25);
    }

    .design-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #fff;
    }

    .design-card .label {
      padding: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    button {
      padding: 10px 20px;
      font-size: 15px;
      margin: 8px 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
    }

    .btn-preview {
      background: #ffc107;
      color: #000;
    }

    .btn-download {
      background: #28a745;
      color: white;
    }

    .canvas-wrap {
      margin-top: 25px;
    }

    canvas {
      background: #fff;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .hint {
      font-size: 14px;
      opacity: 0.95;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h2>🎉 صمّم بطاقة تهنئتك بالعيد</h2>
  <div class="hint">اختر التصميم ثم اكتب اسمك واضغط عرض البطاقة</div>

  <input type="text" id="name" placeholder="اكتب اسمك هنا">
  
  <div class="designs">
    <div class="design-card selected" data-design="1" onclick="selectDesign(1)">
      <img src="eid-design.png" alt="التصميم الأول">
      <div class="label">التصميم الأول</div>
    </div>

    <div class="design-card" data-design="2" onclick="selectDesign(2)">
      <img src="eid-design2.png" alt="التصميم الثاني">
      <div class="label">التصميم الثاني</div>
    </div>
  </div>

  <button class="btn-preview" onclick="generateCard()">عرض البطاقة</button>
  <button class="btn-download" onclick="downloadCard()">تحميل البطاقة</button>

  <div class="canvas-wrap">
    <canvas id="card" width="900" height="1650"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("card");
    const ctx = canvas.getContext("2d");

    let selectedDesign = 1;

    const designs = {
      1: {
        src: "eid-design.png",
        nameY: 1255,
        nameColor: "#ffffff"
      },
      2: {
        src: "eid-design-2.png",
        nameY: 1385,
        nameColor: "#0d2e4d"
      }
    };

    const loadedImages = {};

    function preloadImages() {
      Object.keys(designs).forEach(key => {
        const img = new Image();
        img.src = designs[key].src;
        img.onload = function() {
          loadedImages[key] = img;
          if (parseInt(key) === selectedDesign) {
            drawBaseCard();
          }
        };
      });
    }

    function selectDesign(designNumber) {
      selectedDesign = designNumber;

      document.querySelectorAll(".design-card").forEach(card => {
        card.classList.remove("selected");
      });

      document.querySelector(`.design-card[data-design="${designNumber}"]`).classList.add("selected");

      drawBaseCard();
    }

    function drawBaseCard() {
      const img = loadedImages[selectedDesign];
      if (!img) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function generateCard() {
      drawBaseCard();

      const name = document.getElementById("name").value.trim();
      if (!name) return;

      const currentDesign = designs[selectedDesign];

      let fontSize = 42;
      if (name.length > 18) fontSize = 34;
      if (name.length > 25) fontSize = 28;

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = currentDesign.nameColor;
      ctx.font = `bold ${fontSize}px Cairo`;

      ctx.shadowColor = "rgba(0,0,0,0.18)";
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 2;

      const x = canvas.width / 2;
      const y = currentDesign.nameY;

      ctx.fillText(name, x, y);
      ctx.restore();
    }

    function downloadCard() {
      const link = document.createElement("a");
      link.download = "eid-card.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    preloadImages();
  </script>

</body>
</html>
