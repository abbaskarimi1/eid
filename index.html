<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة تهنئة بالعيد</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0d6efd, #0a3d91);
      color: white;
      padding: 30px 15px;
      margin: 0;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    input[type="text"] {
      padding: 12px;
      width: 280px;
      max-width: 90%;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 12px;
    }

    button {
      padding: 10px 20px;
      font-size: 15px;
      margin: 8px 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
    }

    .btn-preview {
      background: #ffc107;
      color: #000;
    }

    .btn-download {
      background: #28a745;
      color: white;
    }

    .canvas-wrap {
      margin-top: 25px;
    }

    canvas {
      background: #fff;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <h2>🎉 صمّم بطاقة تهنئتك بالعيد</h2>

  <input type="text" id="name" placeholder="اكتب اسمك هنا">
  <br>

  <button class="btn-preview" onclick="generateCard()">عرض البطاقة</button>
  <button class="btn-download" onclick="downloadCard()">تحميل البطاقة</button>

  <div class="canvas-wrap">
    <canvas id="card" width="900" height="1650"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("card");
    const ctx = canvas.getContext("2d");

    function generateCard() {
      const name = document.getElementById("name").value.trim();

      if (!name) {
        alert("اكتب اسمك أولاً");
        return;
      }

      const bg = new Image();
      bg.src = "eid-design.png";

      bg.onload = function () {
        // تنظيف اللوحة
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // رسم التصميم كاملاً
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

        // إعداد النص داخل المستطيل الأزرق
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 42px Cairo";

        // ظل خفيف للنص
        ctx.shadowColor = "rgba(0,0,0,0.20)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 2;

        // مكان الاسم داخل المستطيل الأزرق
        const x = canvas.width / 2;
        const y = 1225;

        ctx.fillText(name, x, y);
        ctx.restore();
      };

      bg.onerror = function () {
        alert("تعذر تحميل الصورة. تأكد أن اسم الملف هو eid-design.png وموجود بجانب index.html");
      };
    }

    function downloadCard() {
      const link = document.createElement("a");
      link.download = "eid-card.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
