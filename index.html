<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة تهنئة بالعيد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      text-align: center;
body {
  font-family: 'Cairo', sans-serif;
  text-align: center;
  color: white;
  padding: 30px 15px;
  margin: 0;

  background:
    linear-gradient(rgba(10,10,10,0.45), rgba(10,10,10,0.45)),
    url('https://images.unsplash.com/photo-1519817650390-64a93db511aa?q=80&w=1600&auto=format&fit=crop');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
      color: white;
      padding: 30px 15px;
      margin: 0;
    }
    h2 { margin-bottom: 10px; font-size: 28px; }
    h3 { margin-top: 0; margin-bottom: 10px; font-weight: 700; opacity: 0.9; }
    .hint { font-size: 14px; opacity: 0.95; margin-bottom: 18px; }

    .input-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px; margin-bottom: 8px;
    }
    input[type="text"] {
      padding: 12px; width: 280px; max-width: 90%;
      font-size: 16px; border-radius: 10px;
      border: 2px solid transparent; outline: none;
      font-family: 'Cairo', sans-serif; transition: 0.2s ease;
    }
    input[type="text"]:focus {
      border-color: #ffc107;
      box-shadow: 0 0 0 4px rgba(255,193,7,0.2);
    }
    .validation-message {
      min-height: 24px; font-size: 14px;
      color: #ffe082; font-weight: 700;
    }

    .designs {
      display: flex; justify-content: center;
      gap: 16px; flex-wrap: wrap; margin: 20px 0;
    }
    .design-card {
      width: 180px; border: 3px solid transparent;
      border-radius: 14px; overflow: hidden; cursor: pointer;
      background: rgba(255,255,255,0.08); transition: 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .design-card:hover { transform: translateY(-3px); }
    .design-card.selected {
      border-color: #ffc107;
      box-shadow: 0 0 0 4px rgba(255,193,7,0.25);
    }
    .design-card img {
      width: 100%; height: 320px;
      object-fit: cover; display: block; background: #fff;
    }
    .design-card .label { padding: 8px; font-size: 14px; font-weight: 700; }

    button {
      padding: 10px 20px; font-size: 15px; margin: 8px 5px;
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Cairo', sans-serif; font-weight: 700; transition: 0.2s ease;
    }
    .btn-preview { background: #ffc107; color: #000; }
    .btn-download { background: #28a745; color: white; }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .canvas-wrap { margin-top: 25px; }
    canvas {
      background: #fff; border-radius: 12px;
      max-width: 100%; height: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <h2>🎉 صمّم بطاقة تهنئتك بالعيد</h2>
  <h3>... BY ALKARIMI ...</h3>
  <div class="hint">اختر التصميم ثم اكتب اسمك واضغط عرض البطاقة</div>

  <div class="input-wrap">
    <input type="text" id="name" placeholder="اكتب اسمك هنا" maxlength="40">
    <div class="validation-message" id="validationMessage"></div>
  </div>

  <div class="designs">
    <div class="design-card selected" data-design="1" onclick="selectDesign(1)">
      <img src="IMG_5705.png" alt="التصميم الأول">
      <div class="label">التصميم الأول</div>
    </div>
    <div class="design-card" data-design="2" onclick="selectDesign(2)">
      <img src="IMG_5706.png" alt="التصميم الثاني">
      <div class="label">التصميم الثاني</div>
    </div>
  </div>

  <button class="btn-preview" id="previewBtn" disabled onclick="generateCard()">عرض البطاقة</button>
  <button class="btn-download" id="downloadBtn" disabled onclick="downloadCard()">تحميل البطاقة</button>

  <div class="canvas-wrap">
    <canvas id="card" width="900" height="1650"></canvas>
  </div>

  <script>
    const canvas  = document.getElementById("card");
    const ctx     = canvas.getContext("2d");
    const nameInput         = document.getElementById("name");
    const previewBtn        = document.getElementById("previewBtn");
    const downloadBtn       = document.getElementById("downloadBtn");
    const validationMessage = document.getElementById("validationMessage");

    let selectedDesign = 1;

    /*
     * nameY  = vertical center of the pill (scaled to 900×1650 canvas)
     * pillW  = pill width in canvas pixels  → used to clip long names
     * pillH  = pill height in canvas pixels
     * nameColor = text color inside the pill
     *
     * Original image sizes:
     *   card1: 450 × 562   pill center_y_orig = 516   scale_y = 1650/562  ≈ 2.935
     *   card2: 736 × 1102  pill center_y_orig = 1032  scale_y = 1650/1102 ≈ 1.497
     *
     * Pill widths (original) → scaled to canvas:
     *   card1: 340px → 340*(900/450) = 680 canvas px
     *   card2: 520px → 520*(900/736) ≈ 636 canvas px
     */
    const designs = {
      1: {
        src:       "IMG_5705.png",
        nameY:     1514,          // pill vertical center in 900×1650 canvas
        pillW:     680,           // usable pill width (canvas px)
        pillH:     106,           // pill height (canvas px)
        nameColor: "#5a3a1a",     // warm brown, matches the cream pill on card1
        maxFont:   72
      },
      2: {
        src:       "IMG_5706.png",
        nameY:     1545,          // pill vertical center in 900×1650 canvas
        pillW:     636,
        pillH:     120,
        nameColor: "#2a1800",     // dark brown, readable on the cream pill of card2
        maxFont:   72
      }
    };

    /* ── helpers ── */
    function getTrimmedName() { return nameInput.value.trim(); }

    function updateButtonsState() {
      const hasName = getTrimmedName().length > 0;
      previewBtn.disabled  = !hasName;
      downloadBtn.disabled = !hasName;
      validationMessage.textContent = hasName ? "" : "الرجاء كتابة الاسم أولاً";
    }

    /* Fit font size so name never overflows the pill */
    function calcFontSize(name, design) {
      let size = design.maxFont;
      ctx.font = `900 ${size}px Cairo`;
      while (ctx.measureText(name).width > design.pillW - 40 && size > 28) {
        size -= 2;
        ctx.font = `900 ${size}px Cairo`;
      }
      return size;
    }

    /* ── draw ── */
    function drawCard(name, callback) {
      const d   = designs[selectedDesign];
      const img = new Image();
      img.src = d.src;

      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        if (name) {
          const fontSize = calcFontSize(name, d);

          ctx.save();
          ctx.textAlign    = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle    = d.nameColor;
          ctx.font         = `900 ${fontSize}px Cairo`;
          ctx.shadowColor  = "rgba(0,0,0,0.12)";
          ctx.shadowBlur   = 3;
          ctx.shadowOffsetY = 1;
          ctx.fillText(name, canvas.width / 2, d.nameY);
          ctx.restore();
        }

        if (callback) callback();
      };

      img.onerror = () => {
        validationMessage.textContent = "تعذر تحميل التصميم. تأكد من وجود ملفات الصور.";
      };
    }

    /* ── public actions ── */
    function selectDesign(n) {
      selectedDesign = n;
      document.querySelectorAll(".design-card").forEach(c => c.classList.remove("selected"));
      document.querySelector(`.design-card[data-design="${n}"]`).classList.add("selected");
      const name = getTrimmedName();
      drawCard(name || "");
    }

    function generateCard() {
      const name = getTrimmedName();
      if (!name) {
        validationMessage.textContent = "الرجاء كتابة الاسم أولاً";
        nameInput.focus();
        updateButtonsState();
        return;
      }
      drawCard(name);
    }

    function downloadCard() {
      const name = getTrimmedName();
      if (!name) {
        validationMessage.textContent = "اكتب اسمك أولاً قبل تحميل البطاقة";
        nameInput.focus();
        updateButtonsState();
        return;
      }
      drawCard(name, () => {
        const link = document.createElement("a");
        link.download = "eid-card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }

    /* ── listeners ── */
    nameInput.addEventListener("input", () => {
      updateButtonsState();
      drawCard(getTrimmedName());   // live preview as user types
    });

    window.onload = () => {
      updateButtonsState();
      drawCard("");
    };
  </script>

</body>
</html>
